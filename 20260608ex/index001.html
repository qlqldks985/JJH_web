<!DOCTYPE html>
<!-- HTML 버전을 설정한다. 우리는 HTML5를 사용한다. -->

<html lang="en">
    <!-- <html> 태그는 웹문서의 시작을 나타낸다. -->
    
<head>
    <meta charset="UTF-8">  <!-- 나홀로 태그: 닫는 태그없이 사용되는 태그를 뜻 한다.-->
    <!-- 웹문서가 출력될 때 사용되는 인코딩을 설정한다. 대부분 모던웹에서는 UTF-8을 사용한다. -->
    <title>MYHOME</title>
    <!-- <title> ~ </title> 웹문서의 제목을 출력한다. -->
</head>
<!-- <head> ~ </head> 웹문서의 설정 정보를 코딩한다. -->
<body>
    this is index001 page.
    <!-- 처음 만들어 보는 웹문서 입니다.-->
</body>
<!-- 웹문서에서 화면에 출력(렌더링)되는 정보를 코딩한다. -->

</html>
<!-- </html> 태그는 웹문서의 끝을 나타낸다. -->
